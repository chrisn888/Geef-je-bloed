<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bloeddonatie – Registraties</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #222;
      padding: 2rem;
    }
    header {
      background: #c0001a;
      color: white;
      padding: 1.5rem 2rem;
      border-radius: 12px;
      margin-bottom: 2rem;
    }
    header h1 { font-size: 1.6rem; font-weight: 700; }
    header p  { font-size: 0.95rem; margin-top: 0.3rem; opacity: 0.85; }

    .summary {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }
    .card {
      flex: 1;
      min-width: 140px;
      background: white;
      border-radius: 10px;
      padding: 1.2rem 1.5rem;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      text-align: center;
    }
    .card .value { font-size: 2.2rem; font-weight: 700; }
    .card .label { font-size: 0.8rem; color: #666; margin-top: 0.2rem; text-transform: uppercase; letter-spacing: .05em; }
    .card.registered .value { color: #c0001a; }
    .card.free      .value { color: #2c7a2c; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    thead tr { background: #222; color: white; }
    th, td { padding: 0.85rem 1.2rem; text-align: center; font-size: 0.95rem; }
    th { font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: .06em; }
    td:first-child { font-weight: 600; font-size: 1.05rem; }
    tbody tr:nth-child(even) { background: #fafafa; }
    tbody tr:hover { background: #fff3f3; }

    .bar-wrap { display: flex; align-items: center; gap: 0.6rem; }
    .bar { height: 10px; border-radius: 5px; background: #c0001a; min-width: 2px; }
    .bar-bg { flex: 1; height: 10px; background: #eee; border-radius: 5px; overflow: hidden; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .badge.full    { background: #ffe5e5; color: #c0001a; }
    .badge.partial { background: #fff7e5; color: #b07000; }
    .badge.open    { background: #e5f5e5; color: #2c7a2c; }

    footer { margin-top: 1.5rem; font-size: 0.8rem; color: #999; text-align: right; }
    .refresh-hint { margin-top: 1rem; font-size: 0.82rem; color: #888; background: white; padding: 0.8rem 1.2rem; border-radius: 8px; border-left: 3px solid #c0001a; }
  </style>
</head>
<body>

<header>
  <h1>Bloeddonatie – Rotary RSL / Dagmaat nv, Roeselare</h1>
  <p>Zaterdag 13 juni 2026 &nbsp;·&nbsp; Inschrijvingen per tijdslot</p>
</header>

<div class="summary">
  <div class="card registered">
    <div class="value" id="total-registered">–</div>
    <div class="label">Ingeschreven</div>
  </div>
  <div class="card free">
    <div class="value" id="total-free">–</div>
    <div class="label">Vrije plaatsen</div>
  </div>
  <div class="card">
    <div class="value" id="total-capacity">–</div>
    <div class="label">Totale capaciteit</div>
  </div>
  <div class="card">
    <div class="value" id="total-slots">–</div>
    <div class="label">Tijdsloten</div>
  </div>
</div>

<table id="slots-table">
  <thead>
    <tr>
      <th>Tijdslot</th>
      <th>Vrije plaatsen</th>
      <th>Ingeschreven</th>
      <th>Capaciteit</th>
      <th>Bezetting</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody id="slots-body"></tbody>
</table>

<footer id="last-updated"></footer>

<script>
  // ── DATA (updated by fetch.py) ──────────────────────────────────────────
  const SLOTS = [
    { time: "11:00", free: 0,  max: 13 },
    { time: "11:15", free: 4,  max: 13 },
    { time: "11:30", free: 9,  max: 13 },
    { time: "11:45", free: 13,  max: 13 },
    { time: "12:00", free: 13,  max: 13 },
    { time: "12:15", free: 12,  max: 13 },
    { time: "12:30", free: 13,  max: 13 },
    { time: "12:45", free: 13,  max: 13 },
    { time: "13:00", free: 9,  max: 13 },
    { time: "13:15", free: 13,  max: 13 },
    { time: "13:30", free: 11,  max: 13 },
    { time: "13:45", free: 13,  max: 13 },
  ];
  const LAST_UPDATED = "2026-05-13T21:52:39";
  // ────────────────────────────────────────────────────────────────────────

  const tbody = document.getElementById("slots-body");
  let totalFree = 0, totalRegistered = 0, totalCapacity = 0;

  SLOTS.forEach(slot => {
    const registered = slot.max - slot.free;
    const pct = Math.round((registered / slot.max) * 100);
    totalFree       += slot.free;
    totalRegistered += registered;
    totalCapacity   += slot.max;

    const statusClass = registered === slot.max ? "full"
                      : registered > 0           ? "partial"
                      :                            "open";
    const statusText  = registered === slot.max ? "Vol"
                      : registered > 0           ? "Gedeeltelijk"
                      :                            "Vrij";

    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${slot.time}</td>
      <td style="color:#2c7a2c;font-weight:600">${slot.free}</td>
      <td style="color:#c0001a;font-weight:600">${registered}</td>
      <td>${slot.max}</td>
      <td>
        <div class="bar-wrap">
          <div class="bar-bg">
            <div class="bar" style="width:${pct}%"></div>
          </div>
          <span style="font-size:.8rem;color:#666;min-width:30px">${pct}%</span>
        </div>
      </td>
      <td><span class="badge ${statusClass}">${statusText}</span></td>
    `;
    tbody.appendChild(tr);
  });

  document.getElementById("total-registered").textContent = totalRegistered;
  document.getElementById("total-free").textContent       = totalFree;
  document.getElementById("total-capacity").textContent   = totalCapacity;
  document.getElementById("total-slots").textContent      = SLOTS.length;

  const d = new Date(LAST_UPDATED);
  document.getElementById("last-updated").textContent =
    "Laatste update: " + d.toLocaleString("nl-BE");
</script>
</body>
</html>
